name: MLflow CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install mlflow scikit-learn pandas joblib

    - name: Run MLflow Project
      run: |
        cd MLProject
        mlflow run . --no-conda